[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Redirect all API calls to the backend
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_BACKEND_URL.onrender.com/api/:splat"
  status = 200
  force = true

# Handle Next.js rewrites for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  condition = { Role = "prerender" }

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
